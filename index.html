<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Links — SESI 407</title>
<meta name="description" content="Acesso rápido aos sistemas e recursos do Centro Educacional SESI 407.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080f1a;
    --bg2: #0d1825;
    --bg3: #111f30;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(224,49,49,0.35);
    --accent: #e03131;
    --accent2: #ff6b6b;
    --accent-glow: rgba(224,49,49,0.12);
    --text: #f0f4f8;
    --text2: #94a3b8;
    --text3: #64748b;
    --sesi-red: #e03131;
    --sesi-red-light: #ff6b6b;
    --radius: 16px;
    --radius-sm: 10px;
    --font-head: 'Barlow Condensed', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === BACKGROUND === */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .bg-layer::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(224,49,49,0.1) 0%, transparent 70%);
  }
  .bg-layer::after {
    content: '';
    position: absolute;
    bottom: 10%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(224,49,49,0.06) 0%, transparent 70%);
  }
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
  }

  /* === LAYOUT === */
  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-img {
    display: block;
    width: 160px;
    height: auto;
    margin: 0 auto 24px;
    border-radius: 10px;
  }
  h1 {
    font-family: var(--font-head);
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 800;
    font-style: italic;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 10px;
  }
  h1 span { color: var(--sesi-red-light); }
  .subtitle {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto;
  }

  /* === SEARCH === */
  .search-wrap {
    position: relative;
    margin-bottom: 28px;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text3);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px 13px 44px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #search::placeholder { color: var(--text3); }
  #search:focus {
    border-color: rgba(224,49,49,0.4);
    background: rgba(224,49,49,0.05);
  }
  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    transition: background 0.2s;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.15); }
  .clear-btn.visible { display: flex; }

  /* === LINKS LIST === */
  #links-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  /* === LINK CARD === */
  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .link-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.2s;
    border-radius: 0 3px 3px 0;
  }
  .link-card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateX(3px);
  }
  .link-card:hover::before { transform: scaleY(1); }

  .icon-box {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    background: rgba(224,49,49,0.1);
    border: 1px solid rgba(224,49,49,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .link-card:hover .icon-box {
    background: rgba(224,49,49,0.18);
  }

  .link-info { flex: 1; min-width: 0; }
  .link-title {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }
  .link-card:hover .link-title { color: var(--accent2); }
  .link-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arrow-icon {
    width: 20px;
    height: 20px;
    color: var(--text3);
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }
  .link-card:hover .arrow-icon {
    color: var(--accent2);
    transform: translate(2px, -2px);
  }

  /* === EMPTY STATE === */
  #empty-state {
    display: none;
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }
  #empty-state svg { margin: 0 auto 12px; display: block; opacity: 0.4; }
  #empty-state p { font-size: 14px; }

  /* === COUNTER === */
  .counter {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 20px;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  .counter span { color: var(--accent2); font-weight: 500; }

  /* === INFO BANNER === */
  .info-banner {
    margin-top: 28px;
    background: rgba(224,49,49,0.06);
    border: 1px solid rgba(224,49,49,0.15);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeDown 0.6s 0.25s ease both;
  }
  .info-banner svg { width: 18px; height: 18px; color: var(--accent2); flex-shrink: 0; margin-top: 1px; }
  .info-banner p { font-size: 13px; color: var(--text2); line-height: 1.5; }

  /* === FOOTER === */
  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--text3);
    animation: fadeDown 0.6s 0.3s ease both;
  }
  footer a {
    color: var(--text3);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  footer a:hover { color: var(--accent2); border-color: var(--accent2); }

  /* === ANIMATIONS === */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    .page { padding: 28px 16px 60px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>

const DEFAULT_LINKS = [
  { id: 1, icon: '🎓', title: 'Carômetro Escolar', desc: 'Acesso rápido ao sistema de identificação dos estudantes e colaboradores.', url: 'https://oed-sesi.github.io/carometro-sesi-ce407/' },
  { id: 2, icon: '🗓️', title: 'Visão Geral dos Agendamentos', desc: 'Visão geral das reservas de laboratórios, salas e equipamentos.', url: 'https://outlook.cloud.microsoft/host/0/4c4ec2e8-4a2c-4bce-8d8f-00fc664a4e5b/bookings?culture=pt-br&country=br' },
  { id: 3, icon: '🏫', title: 'Agendamento de Espaços e Equipamentos', desc: 'Reserve laboratórios, salas e equipamentos.', url: 'https://outlook.office.com/book/CE407VilaIzabelSoCarlosAgendamentos@sesisenaisp.onmicrosoft.com/' },
  { id: 6, icon: '🗺️', title: 'Mapa de Sala', desc: 'Consulte o Mapa de Sala para cada turma.', url: 'https://SEU-LINK-AQUI.com' },
  { id: 4, icon: '📘', title: 'Diário de Classe', desc: 'Acesso ao diário de classe institucional.', url: 'https://dce.sesisp.org.br/' },
  { id: 5, icon: '📚', title: 'Acervo Biblioteca', desc: 'Consulta do acervo das bibliotecas.', url: 'https://acervo.sesisp.org.br/' },
  { id: 6, icon: '📅', title: 'Horário dos Professores', desc: 'Consulte os horários dos professores e colaboradores.', url: 'https://SEU-LINK-AQUI.com' },
  { id: 7, icon: '🔑', title: 'Retirada de Chaves', desc: 'Controle de retirada e devolução de chaves.', url: 'https://SEU-LINK-AQUI.com' },
];

const links = DEFAULT_LINKS;

/* === RENDER === */
function renderLinks(filtered) {
  const list = filtered ?? links;
  const container = document.getElementById('links-list');
  const empty = document.getElementById('empty-state');
  const counter = document.getElementById('counter');

  container.innerHTML = '';

  if (list.length === 0) {
    empty.style.display = 'block';
    counter.textContent = '';
    return;
  }

  empty.style.display = 'none';
  counter.innerHTML = `<span>${list.length}</span> link${list.length !== 1 ? 's' : ''} disponíve${list.length !== 1 ? 'is' : 'l'}`;

  list.forEach((link, i) => {
    const a = document.createElement('a');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'link-card';
    a.setAttribute('role', 'listitem');
    a.style.animation = `fadeDown 0.4s ${i * 0.05}s ease both`;
    a.innerHTML = `
      <div class="icon-box">${link.icon}</div>
      <div class="link-info">
        <div class="link-title">${escHtml(link.title)}</div>
        <div class="link-desc">${escHtml(link.desc)}</div>
      </div>
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>`;
    container.appendChild(a);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* === SEARCH === */
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.classList.toggle('visible', q.length > 0);
  document.getElementById('empty-query').textContent = q;
  if (!q) { renderLinks(); return; }
  renderLinks(links.filter(l =>
    l.title.toLowerCase().includes(q) || l.desc.toLowerCase().includes(q)
  ));
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  renderLinks();
  searchInput.focus();
});

/* === INIT === */
renderLinks();
</script>
</body>
</html>
